name: Release

# Auto-release on every push to main. The dev workflow is: edit code, push.
# This job computes the next version, stamps it into both plugins,
# builds the zips, and publishes a GitHub Release.
#
# Versioning: the PATCH number is auto-bumped from the latest git tag. To release
# a new MAJOR/MINOR, bump the Version header in
# plugins/certpsu-connector/certpsu-connector.php manually and push.

on:
  push:
    branches: [ main ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.github/**'
  workflow_dispatch:

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  release:
    if: ${{ !contains(github.event.head_commit.message, '[skip release]') }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute next version
        id: ver
        run: |
          set -euo pipefail
          current=$(grep -iE '^[[:space:]]*\*?[[:space:]]*Version:' plugins/certpsu-connector/certpsu-connector.php | head -1 | grep -oE '[0-9]+\.[0-9]+\.[0-9]+' | head -1 || true)
          latest_tag=$(git tag --list 'v*' --sort=-v:refname | grep -oE '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -1 | sed 's/^v//' || true)
          echo "header=${current:-none}  latest_tag=${latest_tag:-none}"

          if [ -z "${latest_tag}" ]; then
            next="${current:-0.1.0}"
          else
            higher=$(printf '%s\n%s\n' "$current" "$latest_tag" | sort -V | tail -1)
            if [ -n "$current" ] && [ "$higher" = "$current" ] && [ "$current" != "$latest_tag" ]; then
              next="$current"
            else
              IFS=. read -r MA MI PA <<< "$latest_tag"
              next="${MA}.${MI}.$((PA + 1))"
            fi
          fi

          if ! printf '%s' "$next" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "Computed version '$next' is not valid semver; aborting." >&2
            exit 1
          fi

          echo "next=$next" >> "$GITHUB_OUTPUT"
          echo "tag=v$next" >> "$GITHUB_OUTPUT"
          echo "Next version: $next (tag v$next)"

      - name: Set up PHP & Composer
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: composer

      - name: Install runtime dependencies (Action Scheduler)
        run: composer install --no-dev --prefer-dist --no-interaction --no-progress

      - name: Stamp version into both plugins
        env:
          NEXT: ${{ steps.ver.outputs.next }}
        run: |
          set -euo pipefail
          # Plugin headers.
          sed -i -E "s/^([[:space:]]*\*[[:space:]]*Version:[[:space:]]*).*/\1${NEXT}/" plugins/certpsu-connector/certpsu-connector.php
          sed -i -E "s/^([[:space:]]*\*[[:space:]]*Version:[[:space:]]*).*/\1${NEXT}/" plugins/certpsu-tutorlms/certpsu-tutorlms.php
          # Version constants.
          sed -i -E "s/(CERTPSU_CONNECTOR_VERSION', ')[0-9.]+(')/\1${NEXT}\2/" plugins/certpsu-connector/certpsu-connector.php
          sed -i -E "s/(CERTPSU_TUTORLMS_VERSION', ')[0-9.]+(')/\1${NEXT}\2/" plugins/certpsu-tutorlms/certpsu-tutorlms.php

      - name: Build plugin zips
        run: bin/build.sh

      - name: List artifacts
        run: ls -lh dist/

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: plugin-zips
          path: dist/*.zip
          if-no-files-found: error

      - name: Publish GitHub Release with assets
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.ver.outputs.tag }}
        run: |
          set -euo pipefail
          gh release create "$TAG" dist/*.zip \
            --target "$GITHUB_SHA" \
            --title "$TAG" \
            --generate-notes
