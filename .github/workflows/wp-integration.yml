name: WP Integration

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  integration:
    name: "WP Integration (PHP ${{ matrix.php-version }}, WP ${{ matrix.wp-version }})"
    runs-on: ubuntu-latest
    
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: wordpress
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3
        
    strategy:
      matrix:
        php-version: ['8.2', '8.3', '8.4']
        wp-version: ['latest']
        
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
    
    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: ${{ matrix.php-version }}
        extensions: mysqli, pdo_mysql, curl, dom, xml, mbstring
        tools: wp-cli, composer

    - name: Install Composer Dependencies
      run: composer install --no-dev --prefer-dist --no-interaction --no-progress

    - name: Setup WordPress
      run: |
        mkdir -p /tmp/wordpress
        cd /tmp/wordpress
        
        # Download WordPress
        wp core download --version=${{ matrix.wp-version }} --allow-root
        
        # Configure Database connection
        wp config create \
          --dbname=wordpress \
          --dbuser=root \
          --dbpass=root \
          --dbhost=127.0.0.1 \
          --allow-root
          
        # Install WordPress
        wp core install \
          --url=http://localhost \
          --title="Test Site" \
          --admin_user=admin \
          --admin_password=admin \
          --admin_email=admin@example.com \
          --skip-email \
          --allow-root

    - name: Link CertPSU Plugins
      run: |
        ln -s ${{ github.workspace }}/plugins/certpsu-connector /tmp/wordpress/wp-content/plugins/certpsu-connector
        ln -s ${{ github.workspace }}/plugins/certpsu-tutorlms /tmp/wordpress/wp-content/plugins/certpsu-tutorlms
        
    - name: Install Required Dependencies
      run: |
        cd /tmp/wordpress
        
        # Install and activate Tutor LMS
        wp plugin install tutor --activate --allow-root
        
    - name: Activate CertPSU Plugins
      run: |
        cd /tmp/wordpress
        
        # Activate connector first
        wp plugin activate certpsu-connector --allow-root
        
        # Activate tutorlms bridge
        wp plugin activate certpsu-tutorlms --allow-root
        
    - name: Verify Activation
      run: |
        cd /tmp/wordpress
        
        # List all active plugins to ensure they show up
        wp plugin list --status=active --allow-root
        
        # Run a simple WP evaluation to ensure no fatal errors have broken the site
        wp eval 'echo "WordPress loads successfully!";' --allow-root

    - name: Smoke Test - Course Completion
      run: |
        cd /tmp/wordpress
        
        # 1. Create a test student
        USER_ID=$(wp user create teststudent test@example.com --role=subscriber --porcelain --allow-root)
        echo "Created User ID: $USER_ID"
        
        # 2. Create a test course
        COURSE_ID=$(wp post create --post_type=courses --post_title="Test Course" --post_status=publish --porcelain --allow-root)
        echo "Created Course ID: $COURSE_ID"
        
        # 3. Enable CertPSU for this course
        wp eval "update_post_meta($COURSE_ID, '_certpsu_course_settings', ['enabled' => true]);" --allow-root
        
        # 4. Trigger the course completion hook
        wp eval "do_action('tutor_course_complete_after', $COURSE_ID, $USER_ID);" --allow-root
        
        # 5. Verify the issuance job was queued in Action Scheduler
        wp eval "
        if ( ! as_has_scheduled_action('certpsu_tutorlms_issue') ) {
          echo 'Error: Certificate issuance job (certpsu_tutorlms_issue) was NOT queued!';
          exit(1);
        } else {
          echo 'Success: Certificate issuance job was queued successfully.';
        }
        " --allow-root

    - name: Smoke Test - Action Scheduler Execution
      run: |
        cd /tmp/wordpress
        
        # We manually process the Action Scheduler queue.
        # This will simulate what happens in the background. It will hit the CertPSU API.
        # It's expected to either succeed or gracefully handle the error (since the fake user isn't on the API).
        # The key is that the execution does not throw a PHP Fatal Error.
        wp action-scheduler run --allow-root || true
        
    - name: Smoke Test - Shortcode Render
      run: |
        cd /tmp/wordpress
        
        # Test rendering the shortcode to ensure no fatal errors when the frontend tries to display certificates
        wp eval '
        $output = do_shortcode("[certpsu_my_certificates]");
        if (strpos($output, "certpsu") !== false || strpos($output, "div") !== false || $output === "") {
          echo "Shortcode rendered successfully.";
        } else {
          echo "Shortcode render failed or returned unexpected output.";
        }
        ' --allow-root
        
    - name: Smoke Test - Settings Update
      run: |
        cd /tmp/wordpress
        
        # Test updating global settings to verify no errors occur on save
        wp eval "
        \$settings = [
          'client_id' => 'test_client',
          'client_secret' => 'test_secret',
          'environment' => 'sandbox'
        ];
        update_option('certpsu_connector_settings', \$settings);
        \$saved = get_option('certpsu_connector_settings');
        if ( empty(\$saved['client_id']) ) {
          echo 'Settings failed to save.';
          exit(1);
        } else {
          echo 'Settings saved successfully.';
        }
        " --allow-root
        
    - name: Lifecycle Test - Deactivate & Reactivate
      run: |
        cd /tmp/wordpress
        
        # Test deactivation
        wp plugin deactivate certpsu-tutorlms certpsu-connector --allow-root
        
        # Verify deactivation doesn't throw fatal errors
        wp eval 'echo "Deactivation successful!";' --allow-root
        
        # Test reactivation
        wp plugin activate certpsu-connector certpsu-tutorlms --allow-root
        
        # Verify reactivation doesn't throw fatal errors
        wp eval 'echo "Reactivation successful!";' --allow-root
